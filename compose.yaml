name: financiamento-bb

services:
  simulador:
    image: financiamento-bb:1.3.0
    build:
      context: .
      args:
        PYTHON_VERSION: "3.13"
        UV_VERSION: "0.9.18"
    init: true
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    ports:
      - "${APP_PORT:-8501}:8501"
    environment:
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: "20"
    volumes:
      - ./dados:/dados
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
